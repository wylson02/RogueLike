r opens.","guard.name":"Sentinel","guard.halt":"Sentinel: Halt. No passage without a weapon.","guard.pass":"Sentinel: You are armed. Pass.","guard.aside":"The Sentinel steps aside.","guard.comeback":"Sentinel: Come back when you are armed.","lysa.scared":"Lysa: N-no\u2026 I\u2026 I can't talk. Kill them\u2026 all of them\u2026","lysa.thanks":"Thank you\u2026 Here. This key opens the armory. Take what you can.","pnj.gift":"You receive: {item}","pnj.kael":"Here. Take this sword. Down here, weakness kills.","pnj.lysa":"N-no\u2026 I can't\u2026 They're everywhere\u2026","pnj.sentinelle":"Halt. No passage without a weapon. Come back armed.","pnj.orin":"The night bites hard here\u2026 be ready.","pnj.elya":"We meet again\u2026 You'll see it through, this time.","pnj.vesna":"I followed you\u2026 That door should never have opened. Come back alive. (They whisper a dark key sleeps in a corner of this hall\u2026)","pnj.aelis":"They say the three seals once held back the Abyss King himself. Breaking them will wake his wrath\u2026 or his end.","pnj.talk":"{name}: {msg}","rival.lvl1":"Another rival for this godforsaken hole? Don't die too fast, I want the glory to myself.","rival.lvl2":"Still standing? Not bad. This floor cost me a nasty gash.","rival.lvl3.sword":"That blade... is that the Legendary Sword? Damn. I... I'll let you have this one.","rival.lvl3.nosword":"Still no legendary weapon? I'll reach the Abyss King before you do.","prisoner.locked":"Torvin (chained): ...The chest... find the key to my chains in the sealed chest at the back...","prisoner.freed":"Torvin: Free! Thank you, stranger. Take this, it'll help you further on.","prisoner.buff":"You feel your limbs grow slightly stronger. (+1 ARM, +3% CRIT)","prisoner.thanks":"I won't forget this. Stay safe out there.","seal.activated":"Seal {id} activated ({n}/3).","seal.hint":"The last seal hums faintly\u2026 somewhere in the temple.","seal.doorsopen":"The ancient locks give way... the central chamber doors open.","sw
